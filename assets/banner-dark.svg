<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" role="img" aria-label="Michelle Yilin Feng — I turn messy human context into memory, judgment, and reusable agent behavior">
  <style>
    .name { font: 700 42px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #e6edf3; }
    .sub  { font: 400 18px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #9198a1; }
    .tag  { font: 600 15px 'SF Mono', 'Fira Code', Consolas, monospace; fill: #79c0ff; }
    .edge { stroke: #3d444d; stroke-width: 1.5; fill: none; }
    .node { fill: #79c0ff; }
    .hub  { fill: #7ee787; }
    .drift { fill: #9198a1; }
  </style>

  <!-- left: identity -->
  <text x="40" y="92" class="name">Michelle Yilin Feng</text>
  <text x="40" y="128" class="sub">AI-native builder — context &#183; memory &#183; agent skills</text>
  <text x="40" y="170" class="tag">messy context &#8594; memory &#8594; judgment &#8594; reusable behavior</text>

  <!-- right: scattered context flowing into a memory graph -->
  <g>
    <!-- edges from hub to satellites, drawing in once -->
    <g class="edge">
      <path d="M760 118 L668 58" stroke-dasharray="120" stroke-dashoffset="120">
        <animate attributeName="stroke-dashoffset" from="120" to="0" dur="1.2s" begin="0.3s" fill="freeze"/>
      </path>
      <path d="M760 118 L856 52" stroke-dasharray="130" stroke-dashoffset="130">
        <animate attributeName="stroke-dashoffset" from="130" to="0" dur="1.2s" begin="0.7s" fill="freeze"/>
      </path>
      <path d="M760 118 L648 158" stroke-dasharray="125" stroke-dashoffset="125">
        <animate attributeName="stroke-dashoffset" from="125" to="0" dur="1.2s" begin="1.1s" fill="freeze"/>
      </path>
      <path d="M760 118 L868 162" stroke-dasharray="120" stroke-dashoffset="120">
        <animate attributeName="stroke-dashoffset" from="120" to="0" dur="1.2s" begin="1.5s" fill="freeze"/>
      </path>
      <path d="M760 118 L718 196" stroke-dasharray="95" stroke-dashoffset="95">
        <animate attributeName="stroke-dashoffset" from="95" to="0" dur="1.2s" begin="1.9s" fill="freeze"/>
      </path>
      <path d="M760 118 L812 34" stroke-dasharray="105" stroke-dashoffset="105">
        <animate attributeName="stroke-dashoffset" from="105" to="0" dur="1.2s" begin="2.3s" fill="freeze"/>
      </path>
      <path d="M668 58 L812 34" stroke-dasharray="150" stroke-dashoffset="150">
        <animate attributeName="stroke-dashoffset" from="150" to="0" dur="1.4s" begin="2.8s" fill="freeze"/>
      </path>
      <path d="M648 158 L718 196" stroke-dasharray="85" stroke-dashoffset="85">
        <animate attributeName="stroke-dashoffset" from="85" to="0" dur="1.2s" begin="3.1s" fill="freeze"/>
      </path>
    </g>

    <!-- satellite nodes, breathing -->
    <g class="node">
      <circle cx="668" cy="58" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="0s"   repeatCount="indefinite"/></circle>
      <circle cx="856" cy="52" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="648" cy="158" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="868" cy="162" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="718" cy="196" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="812" cy="34" r="5"><animate attributeName="opacity" values="0.55;1;0.55" dur="3.6s" begin="3.0s" repeatCount="indefinite"/></circle>
    </g>

    <!-- hub: memory, pulsing -->
    <circle cx="760" cy="118" r="8" class="hub">
      <animate attributeName="r" values="7;10;7" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- messy context drifting into the hub -->
    <circle r="3" class="drift" opacity="0">
      <animateMotion path="M560,70 Q660,88 760,118" dur="4.5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.8;1" dur="4.5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" class="drift" opacity="0">
      <animateMotion path="M556,140 Q660,132 760,118" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.8;1" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" class="drift" opacity="0">
      <animateMotion path="M566,196 Q662,168 760,118" dur="4.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.8;1" dur="4.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
